<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ink Photo Frame Setup</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 320px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        p {
            margin-bottom: 12px;
            line-height: 1.5;
            color: #bdc3c7;
        }
        .url-box {
            background: #34495e;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .url {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
            word-break: break-all;
        }
        .instruction {
            font-size: 0.9rem;
            color: #95a5a6;
            margin-top: 8px;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1rem;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📷</div>
        <h1>E-Ink Photo Frame</h1>
        <p>WiFi 설정을 위해 브라우저에서 아래 주소로 접속하세요.</p>

        <div class="url-box">
            <div class="url">10.42.0.1</div>
            <div class="instruction">브라우저 주소창에 직접 입력</div>
        </div>

        <a href="http://10.42.0.1" class="btn">설정 페이지 열기</a>

        <p style="margin-top: 24px; font-size: 0.85rem;">
            이 창이 자동으로 닫히지 않으면<br>
            Safari, Chrome 등 브라우저 앱을 열어주세요.
        </p>
    </div>
</body>
</html>
