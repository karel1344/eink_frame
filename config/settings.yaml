battery:
  critical_voltage: 3.0
  low_voltage_threshold: 3.3
  show_indicator: true
button:
  gpio_pin: 27
  hold_time: 3
  pull_up: true
display:
  model: 7in3e
  rotation: 0
image_processing:
  auto_rotate: true
  dithering: floyd_steinberg
  fill_mode: fit
logging:
  level: INFO
  max_files: 5
  max_size_mb: 1
ota:
  auto_check: false
  backup_before_update: true
  enabled: true
  update_url: https://api.github.com/repos/USER/eink_frame/releases/latest
photo_selection:
  avoid_repeats: true
  mode: random
  repeat_threshold: 30
photo_sources:
  google_photos:
    album_id: ''
    enabled: false
    path: photos/google
  local:
    enabled: true
    path: photos/local
schedule:
  timezone: Asia/Seoul
  update_time: 06:00
storage:
  google_photos_max_mb: 1000
  local_photos_max_mb: 1000
  prefetch_count: 10
web_ui:
  ap_execution_mode: normal
  ap_password: ''
  ap_safe_timeout: 60
  ap_ssid_prefix: EinkFrame
  captive_portal_enabled: true
  port: 80
  recovery_enabled: true
  timeout: 600
wifi:
  connection_timeout: 30
  enabled: true
  password: ''
  retry_count: 3
  ssid: ''
